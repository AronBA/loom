spring.application.name=loom-backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/loom}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000


# Security - JWT
jwt.secret=${JWT_SECRET:verysecretkeythatislongenoughforhs256algorithm}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.accessCookieName=loom_access_token
jwt.refreshCookieName=loom_refresh_token
jwt.secureCookie=${JWT_SECURE_COOKIE:false}

# Logging
logging.level.root=INFO
logging.level.com.loom=DEBUG

# Server
server.port=8080
management.endpoints.web.exposure.include=health,info,metrics
