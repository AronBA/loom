<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Loom Dashboard</span>
        <div class="d-flex align-items-center">
            <span class="text-light me-3">Welcome, {{ username }}</span>
            <button class="btn btn-outline-light btn-sm" (click)="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-end">
        <div>
            <h2 class="text-3xl font-bold text-white">Dashboard</h2>
            <p class="text-slate-400 mt-1">Overview of system logs and activities</p>
        </div>
        <button (click)="addTestLog()"
            class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg shadow-lg shadow-indigo-500/20 transition-all flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Add Test Log
        </button>
    </div>

    <!-- Filters Card -->
    <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700 rounded-2xl p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">

            <!-- Search -->
            <div class="lg:col-span-2">
                <label class="block text-xs font-medium text-slate-400 mb-1">Search Message</label>
                <div class="relative">
                    <input type="text" [(ngModel)]="searchQuery" (input)="onFilterChange()" placeholder="Search logs..."
                        class="w-full bg-slate-900/50 border border-slate-700 text-slate-200 rounded-lg pl-10 pr-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 absolute left-3 top-3"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <!-- Level Filter -->
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Level</label>
                <select [(ngModel)]="levelFilter" (change)="onFilterChange()"
                    class="w-full bg-slate-900/50 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all appearance-none cursor-pointer">
                    <option value="">All Levels</option>
                    <option value="INFO">INFO</option>
                    <option value="WARN">WARN</option>
                    <option value="ERROR">ERROR</option>
                </select>
            </div>

            <!-- Source Filter -->
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Source</label>
                <input type="text" [(ngModel)]="sourceFilter" (input)="onFilterChange()" placeholder="Filter by source"
                    class="w-full bg-slate-900/50 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-slate-500">
            </div>

            <!-- Date Range (Combined or Separate) -->
            <!-- For simplicity, keeping separate but styled -->
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">From</label>
                <input type="datetime-local" [(ngModel)]="startDate" (change)="onFilterChange()"
                    class="w-full bg-slate-900/50 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-slate-500 [color-scheme:dark]">
            </div>

        </div>
    </div>

    <!-- Data Table -->
    <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700 rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr
                        class="bg-slate-800/80 text-xs uppercase tracking-wider text-slate-400 border-b border-slate-700">
                        <th class="px-6 py-4 font-semibold">Time</th>
                        <th class="px-6 py-4 font-semibold">Level</th>
                        <th class="px-6 py-4 font-semibold">Source</th>
                        <th class="px-6 py-4 font-semibold">Message</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/50">
                    <tr *ngFor="let log of logs" class="hover:bg-slate-700/20 transition-colors group">
                        <td class="px-6 py-4 text-slate-400 text-sm whitespace-nowrap font-mono">
                            {{ log.timestamp | date:'MMM d, HH:mm:ss' }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border"
                                [ngClass]="{
                       'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': log.level === 'INFO',
                       'bg-amber-500/10 text-amber-400 border-amber-500/20': log.level === 'WARN',
                       'bg-rose-500/10 text-rose-400 border-rose-500/20': log.level === 'ERROR'
                     }">
                                {{ log.level }}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-300 text-sm whitespace-nowrap">
                            {{ log.source }}
                        </td>
                        <td class="px-6 py-4 text-slate-300 text-sm group-hover:text-white transition-colors">
                            {{ log.message }}
                        </td>
                    </tr>
                    <tr *ngIf="logs.length === 0">
                        <td colspan="4" class="px-6 py-12 text-center text-slate-500">
                            <div class="flex flex-col items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-3 opacity-50" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                No logs found matching your criteria.
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="bg-slate-800/80 px-6 py-4 border-t border-slate-700 flex items-center justify-between">
            <span class="text-sm text-slate-400">
                Page <span class="font-medium text-slate-200">{{ page + 1 }}</span> of <span
                    class="font-medium text-slate-200">{{ totalPages }}</span>
            </span>
            <div class="flex space-x-2">
                <button [disabled]="page === 0" (click)="prevPage()"
                    class="px-3 py-1.5 text-sm rounded bg-slate-700 text-slate-300 hover:bg-slate-600 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    Previous
                </button>
                <button [disabled]="page >= totalPages - 1" (click)="nextPage()"
                    class="px-3 py-1.5 text-sm rounded bg-slate-700 text-slate-300 hover:bg-slate-600 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    Next
                </button>
            </div>
        </div>
    </div>
</div>
